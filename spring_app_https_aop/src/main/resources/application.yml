server:
  port: 10000
  servlet:
    session:
      tracking-modes: cookie
  ssl:
    enabled: true
    certificate: classpath:key/localhost+3.pem
    certificate-private-key: classpath:key/localhost+3-key.pem
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/spring?serverTimezone=Asia/Seoul
    username: spring
    password: 1234
  session:
    redis:
      repository-type: indexed
      flush-mode: immediate
  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  profiles:
    active: local
    include: oauth

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 10MB
      max-file-size: 5MB
      max-request-size: 15MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.app.app.domain; com.app.app.dto;
  type-handlers-package: com.app.app.mybatis.handler
  configuration:
    map-underscore-to-camel-case: true

